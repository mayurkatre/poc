# RAG System Configuration
# ========================

app:
  name: "RAG POC"
  version: "1.0.0"
  debug: false
  log_level: "INFO"

# --- Ingestion ---
ingestion:
  chunk_size: 512
  chunk_overlap: 64
  chunking_strategy: "semantic"   # Options: semantic | fixed | sentence
  min_chunk_size: 50
  supported_extensions:
    - ".pdf"
    - ".md"
    - ".txt"

# --- Embedding ---
# NOTE: OpenRouter does NOT provide an embeddings API.
# Embeddings always run locally via sentence-transformers (free, no API key needed).
embedding:
  provider: "sentence_transformers"   # Only option — OpenRouter has no embeddings endpoint
  model_name: "all-MiniLM-L6-v2"
  batch_size: 64
  cache_enabled: true
  cache_dir: ".cache/embeddings"

# --- Vector Store ---
vector_store:
  provider: "pinecone"   # Options: faiss | chroma | pinecone
  index_path: ".cache/faiss_index"
  chroma_persist_dir: ".cache/chroma"
  collection_name: "rag_documents"
  top_k: 20   # Initial candidates before reranking
  # Pinecone settings
  pinecone_api_key: "${PINECONE_API_KEY}"
  pinecone_environment: "us-west-2-gcp"
  pinecone_index_name: "rag-documents"
  pinecone_namespace: "default"

# --- Retrieval ---
retrieval:
  strategy: "hybrid"   # Options: hybrid | dense | bm25 | hyde
  hyde_enabled: true
  mmr_enabled: true
  mmr_lambda: 0.5
  bm25_weight: 0.3
  dense_weight: 0.7
  final_top_k: 5

# --- Reranking ---
reranking:
  enabled: true
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_n: 5

# --- Generation (via OpenRouter) ---
# OpenRouter model format: "provider/model-name"
# Popular options:
#   openai/gpt-4o-mini          (fast, cheap — recommended default)
#   openai/gpt-4o               (best OpenAI quality)
#   anthropic/claude-sonnet-4-5 (strong reasoning)
#   meta-llama/llama-3.1-70b-instruct (free tier available)
#   google/gemini-flash-1.5     (very fast)
#   mistralai/mistral-7b-instruct (lightweight)
generation:
  provider: "openrouter"
  model: "arcee-ai/trinity-large-preview:free"
  base_url: "https://openrouter.ai/api/v1"
  temperature: 0.0
  max_tokens: 1024
  streaming: true
  system_prompt: |
    You are a precise and helpful assistant. Answer questions using ONLY the 
    provided context. Always cite your sources. If the context does not contain 
    enough information, explicitly say so. Do not hallucinate facts.

# --- Query Rewriting ---
query_rewriting:
  enabled: true
  model: "arcee-ai/trinity-large-preview:free"   # OpenRouter model format
  num_variants: 3

# --- Evaluation ---
evaluation:
  dataset_path: "evaluation/dataset.json"
  results_path: "evaluation/results.json"
  report_path: "evaluation/report.md"
  judge_model: "arcee-ai/trinity-large-preview:free"   # OpenRouter model for LLM-as-judge
  metrics:
    - faithfulness
    - answer_relevancy
    - context_precision
    - context_recall

# --- API ---
api:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

# --- Observability ---
observability:
  langsmith_enabled: false
  langsmith_project: "rag-poc"
  log_queries: true
  log_latency: true
